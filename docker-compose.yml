services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pplbets_db:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:5173}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_ECHO: ${DB_ECHO:-false}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      ALLOW_DEBUG_AUTH: ${ALLOW_DEBUG_AUTH:-false}
    depends_on:
      - db
    ports:
      - "8000:8000"

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_BASE_URL: http://api:8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:5173}
      ADMINS: ${ADMINS:-}
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pplbets_db:

